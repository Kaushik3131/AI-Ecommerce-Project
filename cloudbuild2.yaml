steps:
  # ============================================================================
  # STEP 1: Build Docker image with build-time secrets from GCP Secret Manager
  # ============================================================================
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker build \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE}:latest \
          --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="$$NEXT_PUBLIC_CLERK_KEY" \
          --build-arg NEXT_PUBLIC_SANITY_PROJECT_ID="$$NEXT_PUBLIC_SANITY_PROJECT_ID" \
          --build-arg NEXT_PUBLIC_SANITY_DATASET="$$NEXT_PUBLIC_SANITY_DATASET" \
          --build-arg NEXT_PUBLIC_SANITY_API_VERSION="$$NEXT_PUBLIC_SANITY_API_VERSION" \
          --build-arg NEXT_PUBLIC_BASE_URL="$$NEXT_PUBLIC_BASE_URL" \
          .
    secretEnv:
      - NEXT_PUBLIC_CLERK_KEY
      - NEXT_PUBLIC_SANITY_PROJECT_ID
      - NEXT_PUBLIC_SANITY_DATASET
      - NEXT_PUBLIC_SANITY_API_VERSION
      - NEXT_PUBLIC_BASE_URL

  # ============================================================================
  # STEP 2: Push Docker image to Artifact Registry
  # ============================================================================
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE}:latest

  # ============================================================================
  # STEP 3: Deploy to Cloud Run with runtime secrets from GCP Secret Manager
  # ============================================================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE}:latest
      - --platform=managed
      - --region=${_REGION}
      - --allow-unauthenticated
      - --port=3000
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --update-secrets=CLERK_SECRET_KEY=clerk-secret-key:latest,SANITY_API_TOKEN=sanity-api-token:latest,GOOGLE_GENERATIVE_AI_API_KEY=google-ai-api-key:latest,PHONEPE_CLIENT_ID=phonepe-client-id:latest,PHONEPE_CLIENT_SECRET=phonepe-client-secret:latest,PHONEPE_MERCHANT_ID=phonepe-merchant-id:latest,PHONEPE_WEBHOOK_USERNAME=phonepe-webhook-username:latest,PHONEPE_WEBHOOK_PASSWORD=phonepe-webhook-password:latest
      - --set-env-vars=PHONEPE_CLIENT_VERSION=${_PHONEPE_CLIENT_VERSION},PHONEPE_MODE=${_PHONEPE_MODE}

# Define secrets from GCP Secret Manager
availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/next-public-clerk-key/versions/latest
      env: NEXT_PUBLIC_CLERK_KEY
    - versionName: projects/${PROJECT_ID}/secrets/next-public-sanity-project-id/versions/latest
      env: NEXT_PUBLIC_SANITY_PROJECT_ID
    - versionName: projects/${PROJECT_ID}/secrets/next-public-sanity-dataset/versions/latest
      env: NEXT_PUBLIC_SANITY_DATASET
    - versionName: projects/${PROJECT_ID}/secrets/next-public-sanity-api-version/versions/latest
      env: NEXT_PUBLIC_SANITY_API_VERSION
    - versionName: projects/${PROJECT_ID}/secrets/next-public-base-url/versions/latest
      env: NEXT_PUBLIC_BASE_URL

# Default substitution values (can be overridden in Cloud Build trigger)
substitutions:
  _PHONEPE_CLIENT_VERSION: v1
  _PHONEPE_MODE: TEST

# Logging configuration (required when using custom service account)
options:
  logging: CLOUD_LOGGING_ONLY

